services:
  crm-database:
    profiles: ["dev"]
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${CRM_DB_USERNAME:-postgres}
      - POSTGRES_DB=${CRM_DB_NAME:-crm_db}
      - POSTGRES_PASSWORD=${CRM_DB_PASSWORD}
    volumes:
      - ./crm-backend/database_script/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8080:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak-db:
    profiles: ["dev"]
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${KEYCLOAK_DB_USERNAME:-postgres}
      - POSTGRES_DB=${KEYCLOAK_DB_NAME:-keycloak}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    ports:
      - "8081:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    profiles: ["dev"]
    build:
      context: keycloak
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--verbose", "--proxy-headers=xforwarded", "--http-relative-path=/keycloak"]
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_IMPORT=/opt/keycloak/data/import/realm-config.json
      - KC_DB=${KC_DB:-postgres}
      - KC_DB_URL=${KC_DB_URL:-jdbc:postgresql://keycloak-db:5432/keycloak}
      - KC_DB_USERNAME=${KC_DB_USERNAME:-postgres}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=8087
      - KC_HTTP_ENABLED=${KC_HTTP_ENABLED:-true}
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/dev-config.json:/opt/keycloak/data/import/realm-config.json
    ports:
      - "8082:8080"
    networks:
      - backend
      - reverse-proxy
    depends_on:
      keycloak-db:
        condition: service_healthy


  openfiles:
    profiles: ["dev"]
    image: totalplatform/openfiles:latest
    restart: unless-stopped
    environment:
      - OPENFILES_PORT=${OPENFILES_PORT:-8001}
      - OPENFILES_DATA_PATH=${OPENFILES_DATA_PATH:-/var/lib/openfiles}
    ports:
      - "8083:8001"
    networks:
      - backend

  jaeger:
    profiles: ["dev"]
    image: jaegertracing/jaeger:latest
    restart: unless-stopped
    ports:
      - "8084:6831/udp"
      - "8085:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend
    
  swagger-doc-gen:
    profiles: ["init", "dev"]
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./krakend/config:/app/docs/openapi
    command:   npm run swagger

  krakend-config:
    profiles: ["init", "dev"]
    build:
      context: krakend/swagger2krakend
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/config
    environment:
      - SWAGGER_FILE=/config/swagger.yaml
      - OUTPUT_FILE=/config/krakend.json
      - KEYCLOAK_URL=http://keycloak:8080/keycloak
      - REALM_NAME=optimce-realm
      - BACKEND_HOST=http://crm-backend:80
      - REALM_NAME=optimce-realm
      - ISSUER=http://localhost:8087/keycloak/realms/optimce-realm
    depends_on:
      swagger-doc-gen:
        condition: service_completed_successfully
  krakend:
    profiles: ["dev"]
    image: krakend:latest
    ports:
      - "8086:8080"
    volumes:
      - ./krakend/config:/etc/krakend
    networks:
      - backend
      - reverse-proxy
    depends_on:
      crm-backend:
        condition: service_started
      keycloak:
        condition: service_started
  reverse-proxy:
    profiles: ["dev"]
    image: nginx:latest
    ports:
      - "8087:80"
      - "8088:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - reverse-proxy
    depends_on:
      krakend:
        condition: service_started

  crm-backend:
    profiles: ["dev"]
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    command: npm run dev
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-80}
      - MICROSERVICE_NAME=${MICROSERVICE_NAME:-crm-backend}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:8090}
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_PORT=${SERVER_PORT:-80}
      - IAM_SERVICE_NAME=${IAM_SERVICE_NAME}
      - IAM_REALM=${IAM_REALM}
      - IAM_REALM_NAME=${IAM_REALM_NAME}
      - IAM_BASE_URL=${IAM_BASE_URL}
      - IAM_CLIENT_ID=${IAM_CLIENT_ID}
      - IAM_GRANT_TYPE=${IAM_GRANT_TYPE}
      - IAM_CLIENT_SECRET=${IAM_CLIENT_SECRET}
      - STORAGE_SERVICE_NAME=${STORAGE_SERVICE_NAME:-openfiles}
      - STORAGE_TARGET=${STORAGE_TARGET:-http://openfiles:8001}
      - STORAGE_DB_NAME=${STORAGE_DB_NAME:-crm_files}
      - STORAGE_TOKEN=${STORAGE_TOKEN}
      - REMOTE_LOGGING=${REMOTE_LOGGING:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=${DB_HOST:-crm-database}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-crm_db}
    ports:
      - "8089:80"
    networks:
      - backend
    depends_on:
      crm-database:
        condition: service_healthy
      openfiles:
        condition: service_started
      jaeger:
        condition: service_started
  crm-frontend-config:
    profiles : ["init", "dev"]
    image: ghcr.io/ourouk/alpine-envsubst:main
    env_file:
      - .env.dev
    volumes:
      - ./crm-frontend-config:/config
    command: 
      - < /config/config.template.json > /config/config.json

  crm-frontend:
    profiles: ["dev"]
    build:
      context: crm-frontend
      dockerfile: Dockerfile
    volumes:
      - ./crm-frontend-config/config.json:/usr/share/nginx/html/assets/config/config.json
    environment:
      - NODE_ENV=production
    ports:
      - "8090:80"
    networks:
      - reverse-proxy

networks:
  backend:
  reverse-proxy: