services:
  crm-database:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${CRM_DB_USERNAME:-postgres}
      - POSTGRES_DB=${CRM_DB_NAME:-crm_db}
      - POSTGRES_PASSWORD=${CRM_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./crm-backend/database_script/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - crm

  keycloak-db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${KEYCLOAK_DB_USERNAME:-postgres}
      - POSTGRES_DB=${KEYCLOAK_DB_NAME:-keycloak}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    ports:
      - "5433:5432"
    # volumes:
      # - ./database_init/keycloak-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - keycloak

  keycloak:
    build:
      context: keycloak
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--verbose"]
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_IMPORT=/opt/keycloak/data/import/realm-config.json
      - KC_DB=${KC_DB:-postgres}
      - KC_DB_URL=${KC_DB_URL:-jdbc:postgresql://keycloak-db:5432/keycloak}
      - KC_DB_USERNAME=${KC_DB_USERNAME:-postgres}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_HOSTNAME=${KC_HOSTNAME:-localhost}
      - KC_HTTP_ENABLED=${KC_HTTP_ENABLED:-true}
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/dev-config.json:/opt/keycloak/data/import/realm-config.json
    ports:
      - "8080:8080"
    networks:
      - keycloak
      - api-gateway
      - reverse-proxy
    depends_on:
      - keycloak-db
  openfiles:
    image: totalplatform/openfiles:latest
    restart: unless-stopped
    environment:
      - OPENFILES_PORT=${OPENFILES_PORT:-8001}
      - OPENFILES_DATA_PATH=${OPENFILES_DATA_PATH:-/var/lib/openfiles}
    ports:
      - "8001:8001"
    networks:
      - openfiles

  jaeger:
    image: jaegertracing/jaeger:latest
    restart: unless-stopped
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - opentelemetry
    
  swagger-doc-gen:
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./krakend/config:/app/docs/openapi
    command:   npm run swagger

  krakend-config:
    build:
      context: krakend/swagger2krakend
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/config
    environment:
      - SWAGGER_FILE=/config/swagger.yaml
      - OUTPUT_FILE=/config/krakend.json
      - KEYCLOAK_URL=http://keycloak:8080
      - REALM_NAME=optimce-realm
      - BACKEND_HOST=http://crm-backend:80
      - ISSUER_URL=http://keycloak:8080/realms/optimce-realm
    depends_on:
      - swagger-doc-gen

  krakend:
    image: krakend:latest
    ports:
      - "8090:8080"
    volumes:
      - ./krakend/config:/etc/krakend
    networks:
      - api-gateway
    depends_on:
      - krakend-config

  reverse-proxy:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - reverse-proxy

  letsencrypt:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/certs:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --d optimce.be --email adminl@optimce.be

  crm-backend:
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    command: npm run dev
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-80}
      - MICROSERVICE_NAME=${MICROSERVICE_NAME:-crm-backend}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:4200}
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_PORT=${SERVER_PORT:-80}
      - IAM_SERVICE_NAME=${IAM_SERVICE_NAME:-KEYCLOACK}
      - IAM_REALM=${IAM_REALM:-master}
      - IAM_REALM_NAME=${IAM_REALM_NAME:-master}
      - IAM_BASE_URL=${IAM_BASE_URL:-http://keycloak:8080}
      - IAM_CLIENT_ID=${IAM_CLIENT_ID:-admin-cli}
      - IAM_GRANT_TYPE=${IAM_GRANT_TYPE:-password}
      - IAM_CLIENT_SECRET=${IAM_CLIENT_SECRET}
      - STORAGE_SERVICE_NAME=${STORAGE_SERVICE_NAME:-openfiles}
      - STORAGE_TARGET=${STORAGE_TARGET:-http://openfiles:8001}
      - STORAGE_DB_NAME=${STORAGE_DB_NAME:-crm_files}
      - STORAGE_TOKEN=${STORAGE_TOKEN}
      - REMOTE_LOGGING=${REMOTE_LOGGING:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=${DB_HOST:-crm-database}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-crm_db}
    ports:
      - "3000:80"
    networks:
      - api-gateway
      - crm
      - keycloak
      - openfiles
      - opentelemetry
    depends_on:
      - crm-database
      - keycloak
      - openfiles
      - jaeger
  crm-frontend-config:
    image: alpine:latest
    env_file:
      - .env.dev
    volumes:
      - ./crm-frontend-config:/config
    command:
      - sh
      - -c
      - |
        apk add --no-cache gettext
        envsubst < /config/config.template.json > /config/config.json

  crm-frontend:
    build:
      context: crm-frontend
      dockerfile: Dockerfile
    volumes:
      - ./crm-frontend-config/config.json:/usr/share/nginx/html/assets/config/config.json
    environment:
      - NODE_ENV=production
    ports:
      - "4200:80"
    networks:
      - reverse-proxy
    depends_on:
      crm-frontend-config:
        condition: service_completed_successfully

networks:
  reverse-proxy:
  api-gateway:
  crm:
  keycloak:
  openfiles:
  opentelemetry: