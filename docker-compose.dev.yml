services:
  crm-database:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=crm_db
      - POSTGRES_PASSWORD=${CRM_DB_PASSWORD}
    volumes:
      - ./crm-backend/tests/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8080:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak-db:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    ports:
      - "8081:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    profiles: ["dev"]
    build:
      context: keycloak
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--verbose", "--proxy-headers=xforwarded", "--http-relative-path=/keycloak"]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
      - KEYCLOAK_IMPORT=/opt/keycloak/data/import/realm-config.json
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME}
      - KC_HOSTNAME_PORT=8087
      - KC_HTTP_ENABLED=true
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
    ports:
      - "8082:8080"
    networks:
      - backend
      - reverse-proxy
    depends_on:
      keycloak-db:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully
    volumes:
      - ./keycloak/realm/dev-config.json:/opt/keycloak/data/import/realm-config.json
      - ./keycloak/themes:/opt/keycloak/themes
      - ./keycloak/providers:/opt/keycloak/providers

  minio:
    profiles: ["dev"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "8091:9000"
      - "8092:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend
      - reverse-proxy
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    profiles: ["dev"]
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local ${STORAGE_API_URL} $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/$${STORAGE_BUCKET:-crm-files};
      exit 0;
      "
    networks:
      - backend

  jaeger:
    profiles: ["dev"]
    image: jaegertracing/jaeger:latest@sha256:bf7f805da4c2bc8d58a6c81ee650fdb6b8e4287698f95fbe231c09c865bc397f
    restart: unless-stopped
    ports:
      - "8084:6831/udp"
      - "8085:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend
    
  swagger-doc-gen:
    profiles: ["init", "dev"]
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./krakend/config:/app/docs/openapi
    command: sh -c "npm run swagger && sleep 3 && mv /app/docs/openapi/swagger.yaml /app/docs/openapi/root.yaml"

  krakend-config:
    profiles: ["init", "dev"]
    build:
      context: krakend/swagger2krakend
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/config
    environment:
      - CONFIG_FILE=/config/krakend-builder.yaml
      - OUTPUT_FILE=/config/krakend.json
    depends_on:
      swagger-doc-gen:
        condition: service_completed_successfully

  krakend:
    profiles: ["dev"]
    image: krakend:latest@sha256:bd392b692271209927da6c62f1b42d7f8f7bd0cd60b00d97c93bb5b8d42b4999
    ports:
      - "8086:8080"
    volumes:
      - ./krakend/config:/etc/krakend
    networks:
      - backend
      - reverse-proxy
    depends_on:
      crm-backend:
        condition: service_started
      keycloak:
        condition: service_started

  reverse-proxy:
    profiles: ["dev"]
    image: nginx:latest@sha256:7150b3a39203cb5bee612ff4a9d18774f8c7caf6399d6e8985e97e28eb751c18
    ports:
      - "8087:80"
      - "8088:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    networks:      
      - reverse-proxy
    depends_on:
      krakend:
        condition: service_started

  crm-backend:
    profiles: ["dev"]
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    command: npm run dev
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=80
      - MICROSERVICE_NAME=crm-backend
      - ALLOWED_ORIGIN=${APP_CORS_ALLOWED_ORIGIN}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=80
      - IAM_SERVICE_NAME=KEYCLOAK
      - IAM_REALM=optimce-realm
      - IAM_REALM_NAME=optimce-realm
      - IAM_BASE_URL=http://keycloak:8080/keycloak
      - IAM_CLIENT_ID=optimce-backend
      - IAM_GRANT_TYPE=client_credentials
      - IAM_CLIENT_SECRET=${AUTH_CLIENT_SECRET}
      - STORAGE_SERVICE_NAME=S3
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - STORAGE_REGION=us-east-1
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT}
      - REMOTE_LOGGING=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - DB_TYPE=postgres
      - DB_HOST=crm-database
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${CRM_DB_PASSWORD}
      - DB_NAME=crm_db
    ports:
      - "8089:80"
    networks:
      - backend
    depends_on:
      crm-database:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started

  keycloak-theme-init:
    profiles: ["init"]
    build:
      context: optimce-keycloak-theme
      dockerfile: Dockerfile
    volumes:
      - ./keycloak/providers:/output
    entrypoint: ["/bin/sh", "-c"]
    command: ["apt-get update -qq && apt-get install -y -qq unzip && mkdir -p /theme-fix /dist && cd /theme-fix && unzip -o /app/dist_keycloak/keycloak-theme-for-kc-all-other-versions.jar && mv theme/keycloakify-starter theme/optimce && echo '{\"themes\":[{\"name\":\"optimce\",\"types\":[\"login\"]}]}' > META-INF/keycloak-themes.json && zip -r /dist/keycloak-theme-for-kc-all-other-versions.jar META-INF theme && cp /dist/keycloak-theme-for-kc-all-other-versions.jar /output/ && ls -la /output/"]

  keycloak-mapper-init:
    profiles: ["init"]
    build:
      context: keycloak
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ./keycloak/providers:/output
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /app/target/kc-groupid-mapper-*.jar /output/ && ls -la /output/"]

  keycloak-config:
    profiles: ["init", "dev"]
    image: ghcr.io/ourouk/alpine-envsubst:main@sha256:10899e32576d793f054ddbf23889dc6ef6295726d350a377efc110a976c1a11e
    env_file:
      - .env.dev
    volumes:
      - ./keycloak/realm:/config
    command:
      - < /config/dev-config.template.json > /config/dev-config.json

  crm-frontend-config:
    profiles : ["init", "dev"]
    image: ghcr.io/ourouk/alpine-envsubst:main@sha256:10899e32576d793f054ddbf23889dc6ef6295726d350a377efc110a976c1a11e
    env_file:
      - .env.dev
    volumes:
      - ./crm-frontend-config:/config
    command: 
      - < /config/config.template.json > /config/config.json

  crm-frontend:
    profiles: ["dev"]
    build:
      context: crm-frontend
      dockerfile: Dockerfile
    volumes:
      - ./crm-frontend-config/config.json:/usr/share/nginx/html/assets/config/config.json
    environment:
      - NODE_ENV=production
    ports:
      - "8090:80"
    networks:
      - reverse-proxy

volumes:
  minio_data:

networks:
  backend:
  reverse-proxy:
