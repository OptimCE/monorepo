services:
  crm-database:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=crm_db
      - POSTGRES_PASSWORD=${CRM_DB_PASSWORD}
    volumes:
      - ./crm-backend/database_script/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8080:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak-db:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    ports:
      - "8081:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    profiles: ["dev"]
    build:
      context: keycloak
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--verbose", "--proxy-headers=xforwarded", "--http-relative-path=/keycloak"]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_IMPORT=/opt/keycloak/data/import/realm-config.json
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=8087
      - KC_HTTP_ENABLED=true
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD}
    volumes:
      - ./keycloak/dev-config.json:/opt/keycloak/data/import/realm-config.json
    ports:
      - "8082:8080"
    networks:
      - backend
      - reverse-proxy
    depends_on:
      keycloak-db:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully

  openfiles:
    profiles: ["dev"]
    image: totalplatform/openfiles:latest@sha256:3fb6326dc32f88423862a084e31ede658892d41b397a5c60705135809990a732
    restart: unless-stopped
    environment:
      - OPENFILES_PORT=8001
      - OPENFILES_DATA_PATH=/var/lib/openfiles
    ports:
      - "8083:8001"
    networks:
      - backend

  jaeger:
    profiles: ["dev"]
    image: jaegertracing/jaeger:latest@sha256:bf7f805da4c2bc8d58a6c81ee650fdb6b8e4287698f95fbe231c09c865bc397f
    restart: unless-stopped
    ports:
      - "8084:6831/udp"
      - "8085:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend
    
  swagger-doc-gen:
    profiles: ["init", "dev"]
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./krakend/config:/app/docs/openapi
    command:   npm run swagger

  krakend-config:
    profiles: ["init", "dev"]
    build:
      context: krakend/swagger2krakend
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/config
    environment:
      - SWAGGER_FILE=/config/swagger.yaml
      - OUTPUT_FILE=/config/krakend.json
      - KEYCLOAK_URL=http://keycloak:8080/keycloak
      - REALM_NAME=optimce-realm
      - BACKEND_HOST=http://crm-backend:80
      - ISSUER=http://localhost:8087/keycloak/realms/optimce-realm
    depends_on:
      swagger-doc-gen:
        condition: service_completed_successfully

  krakend:
    profiles: ["dev"]
    image: krakend:latest@sha256:bd392b692271209927da6c62f1b42d7f8f7bd0cd60b00d97c93bb5b8d42b4999
    ports:
      - "8086:8080"
    volumes:
      - ./krakend/config:/etc/krakend
    networks:
      - backend
      - reverse-proxy
    depends_on:
      crm-backend:
        condition: service_started
      keycloak:
        condition: service_started

  reverse-proxy:
    profiles: ["dev"]
    image: nginx:latest@sha256:dec7a90bd0973b076832dc56933fe876bc014929e14b4ec49923951405370112
    ports:
      - "8087:80"
      - "8088:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - reverse-proxy
    depends_on:
      krakend:
        condition: service_started

  crm-backend:
    profiles: ["dev"]
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    command: npm run dev
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=80
      - MICROSERVICE_NAME=crm-backend
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=80
      - IAM_SERVICE_NAME=KEYCLOAK
      - IAM_REALM=optimce-realm
      - IAM_REALM_NAME=optimce-realm
      - IAM_BASE_URL=http://keycloak:8080/keycloak
      - IAM_CLIENT_ID=optimce-backend
      - IAM_GRANT_TYPE=client_credentials
      - IAM_CLIENT_SECRET=${IAM_CLIENT_SECRET}
      - STORAGE_SERVICE_NAME=openfiles
      - STORAGE_TARGET=http://openfiles:8001
      - STORAGE_DB_NAME=crm_files
      - STORAGE_TOKEN=${STORAGE_TOKEN}
      - REMOTE_LOGGING=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - DB_TYPE=postgres
      - DB_HOST=crm-database
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${CRM_DB_PASSWORD}
      - DB_NAME=crm_db
    ports:
      - "8089:80"
    networks:
      - backend
    depends_on:
      crm-database:
        condition: service_healthy
      openfiles:
        condition: service_started
      jaeger:
        condition: service_started

  keycloak-config:
    profiles: ["init", "dev"]
    image: ghcr.io/ourouk/alpine-envsubst:main@sha256:10899e32576d793f054ddbf23889dc6ef6295726d350a377efc110a976c1a11e
    env_file:
      - .env.dev
    volumes:
      - ./keycloak:/config
    command:
      - < /config/dev-config.template.json > /config/dev-config.json

  crm-frontend-config:
    profiles : ["init", "dev"]
    image: ghcr.io/ourouk/alpine-envsubst:main@sha256:10899e32576d793f054ddbf23889dc6ef6295726d350a377efc110a976c1a11e
    env_file:
      - .env.dev
    volumes:
      - ./crm-frontend-config:/config
    command: 
      - < /config/config.template.json > /config/config.json

  crm-frontend:
    profiles: ["dev"]
    build:
      context: crm-frontend
      dockerfile: Dockerfile
    volumes:
      - ./crm-frontend-config/config.json:/usr/share/nginx/html/assets/config/config.json
    environment:
      - NODE_ENV=production
    ports:
      - "8090:80"
    networks:
      - reverse-proxy

networks:
  backend:
  reverse-proxy:
