services:
  crm-database:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=crm_db
      - POSTGRES_PASSWORD=${CRM_DB_PASSWORD}
    volumes:
      - ./crm-backend/tests/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8080:5432"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak-db:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    ports:
      - "8081:5432"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  allocation-key-db:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=allocation_key_local
      - POSTGRES_PASSWORD=${ALLOCATION_KEY_DB_PASSWORD}
    volumes:
      - ./allocation-key-generation/scripts/sql/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8093:5432"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  simulation-key-db:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=simulation_key_local
      - POSTGRES_PASSWORD=${SIMULATION_KEY_DB_PASSWORD}
    volumes:
      - ./simulation-key/scripts/sql/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8096:5432"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  news-board-db:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=news_board_local
      - POSTGRES_PASSWORD=${NEWS_BOARD_DB_PASSWORD}
    volumes:
      - ./news-board/scripts/sql/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8097:5432"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  billing-db:
    profiles: ["dev"]
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=billing_local
      - POSTGRES_PASSWORD=${BILLING_DB_PASSWORD}
    volumes:
      - ./billing/scripts/sql/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "8098:5432"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    profiles: ["dev"]
    build:
      context: keycloak
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "start-dev",
        "--import-realm",
        "--verbose",
        "--proxy-headers=xforwarded",
        "--http-relative-path=/keycloak",
      ]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
      - KEYCLOAK_IMPORT=/opt/keycloak/data/import/realm-config.json
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME}
      - KC_HOSTNAME_PORT=8087
      - KC_HTTP_ENABLED=true
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
    ports:
      - "8082:8080"
    networks:
      - backend
      - reverse-proxy
    depends_on:
      keycloak-db:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully
    volumes:
      - ./keycloak/realm/dev-config.json:/opt/keycloak/data/import/realm-config.json

  minio:
    profiles: ["dev"]
    image: pgsty/minio:latest@sha256:dacff8306a6e0a734518533992dbdcca26bc1ca47f77cf47cb9945725f92b29b
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "8091:9000"
      - "8092:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend
      - reverse-proxy
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    profiles: ["dev"]
    image: pgsty/mc:latest@sha256:873e0b44e9fe7072bb9a0982dfbbb801bab4abb64b0957fe40b8cd8f631694dd
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - TEMPLATES_BUCKET=${TEMPLATES_BUCKET:-optimce-templates}
      - OUTPUT_BUCKET=${OUTPUT_BUCKET:-optimce-documents}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local ${STORAGE_API_URL} $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/$${STORAGE_BUCKET:-crm-files};
      mc mb --ignore-existing local/$${TEMPLATES_BUCKET:-optimce-templates};
      mc mb --ignore-existing local/$${OUTPUT_BUCKET:-optimce-documents};
      mc cp --recursive /templates/billing local/$${TEMPLATES_BUCKET:-optimce-templates}/;
      exit 0;
      "
    volumes:
      - ./billing/document-templates:/templates:ro
    networks:
      - backend

  nats:
    profiles: ["dev"]
    image: nats:2.10-alpine@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    restart: unless-stopped
    command: ["-js", "-m", "8222", "-sd", "/data"]
    ports:
      - "8094:4222"
      - "8095:8222"
    volumes:
      - nats_data:/data
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - 'http://localhost:8222/healthz?js-enabled-only=true' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  jaeger:
    profiles: ["dev"]
    image: jaegertracing/jaeger:latest@sha256:bf7f805da4c2bc8d58a6c81ee650fdb6b8e4287698f95fbe231c09c865bc397f
    restart: unless-stopped
    ports:
      - "8084:6831/udp"
      - "8085:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend

  swagger-doc-gen:
    profiles: ["init", "dev"]
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./krakend/config:/app/docs/openapi
    command: sh -c "npm run swagger && sleep 3 && mv /app/docs/openapi/swagger.yaml /app/docs/openapi/root.yaml"

  generation-doc-gen:
    profiles: ["init", "dev"]
    build:
      context: allocation-key-generation
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/output
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@placeholder:5432/placeholder
      - LOCAL_DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@placeholder:5432/placeholder
      - ALLOW_ORIGIN=*
    entrypoint: ["python", "scripts/export_openapi.py", "/output/generation.json"]

  simulation-doc-gen:
    profiles: ["init", "dev"]
    build:
      context: simulation-key
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/output
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@placeholder:5432/placeholder
      - LOCAL_DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@placeholder:5432/placeholder
      - ALLOW_ORIGIN=*
    entrypoint: ["python", "scripts/export_openapi.py", "/output/simulation.json"]

  news-doc-gen:
    profiles: ["init", "dev"]
    build:
      context: news-board
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/output
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@placeholder:5432/placeholder
      - LOCAL_DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@placeholder:5432/placeholder
      - ALLOW_ORIGIN=*
    entrypoint: ["python", "scripts/export_openapi.py", "/output/news.json"]

  billing-doc-gen:
    profiles: ["init", "dev"]
    build:
      context: billing
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/output
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@placeholder:5432/placeholder
      - LOCAL_DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@placeholder:5432/placeholder
      - ALLOW_ORIGIN=*
    entrypoint: ["python", "scripts/export_openapi.py", "/output/billing.json"]

  krakend-config:
    profiles: ["init", "dev"]
    build:
      context: krakend/swagger2krakend
      dockerfile: Dockerfile
    volumes:
      - ./krakend/config:/config
    environment:
      - CONFIG_FILE=/config/krakend-builder.yaml
      - OUTPUT_FILE=/config/krakend.json
    depends_on:
      swagger-doc-gen:
        condition: service_completed_successfully
      generation-doc-gen:
        condition: service_completed_successfully
      simulation-doc-gen:
        condition: service_completed_successfully
      news-doc-gen:
        condition: service_completed_successfully
      billing-doc-gen:
        condition: service_completed_successfully

  krakend:
    profiles: ["dev"]
    image: krakend:latest@sha256:bd392b692271209927da6c62f1b42d7f8f7bd0cd60b00d97c93bb5b8d42b4999
    ports:
      - "8086:8080"
    volumes:
      - ./krakend/config:/etc/krakend
    networks:
      - backend
      - reverse-proxy
    depends_on:
      crm-backend:
        condition: service_started
      allocation-key-generation:
        condition: service_started
      simulation-key:
        condition: service_started
      optimce-news-board:
        condition: service_started
      billing:
        condition: service_started
      keycloak:
        condition: service_started

  reverse-proxy:
    profiles: ["dev"]
    image: nginx:latest@sha256:7150b3a39203cb5bee612ff4a9d18774f8c7caf6399d6e8985e97e28eb751c18
    ports:
      - "8087:80"
      - "8088:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - reverse-proxy
    depends_on:
      nginx-config:
        condition: service_completed_successfully
      krakend:
        condition: service_started

  crm-backend:
    profiles: ["dev"]
    build:
      context: crm-backend
      dockerfile: Dockerfile.dev
    command: npm run dev
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=80
      - MICROSERVICE_NAME=crm-backend
      - ALLOWED_ORIGIN=${APP_CORS_ALLOWED_ORIGIN}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=80
      - IAM_SERVICE_NAME=KEYCLOAK
      - IAM_REALM=optimce-realm
      - IAM_REALM_NAME=optimce-realm
      - IAM_BASE_URL=http://keycloak:8080/keycloak
      - IAM_CLIENT_ID=optimce-backend
      - IAM_GRANT_TYPE=client_credentials
      - IAM_CLIENT_SECRET=${AUTH_CLIENT_SECRET}
      - STORAGE_SERVICE_NAME=S3
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - STORAGE_REGION=us-east-1
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT}
      - REMOTE_LOGGING=${REMOTE_LOGGING}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - DB_TYPE=postgres
      - DB_HOST=crm-database
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${CRM_DB_PASSWORD}
      - DB_NAME=crm_db
      - REGULATORS_CONFIG_PATH=/app/reference/regulators.json
    volumes:
      - ./reference:/app/reference:ro
    ports:
      - "8089:80"
    networks:
      - backend
    depends_on:
      crm-database:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started

  allocation-key-generation:
    profiles: ["dev"]
    build:
      context: allocation-key-generation
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://postgres:${CRM_DB_PASSWORD}@crm-database:5432/crm_db
      - LOCAL_DATABASE_URL=postgresql+asyncpg://postgres:${ALLOCATION_KEY_DB_PASSWORD}@allocation-key-db:5432/allocation_key_local
      - NATS_URL=nats://nats:4222
      - ALLOW_ORIGIN=*
      - CRM_DB_POOL_SIZE=5
      - CRM_DB_MAX_OVERFLOW=5
      - LOCAL_DB_POOL_SIZE=5
      - LOCAL_DB_MAX_OVERFLOW=5
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_REGION=us-east-1
    ports:
      - "8002:8000"
    networks:
      - backend
    depends_on:
      allocation-key-db:
        condition: service_healthy
      crm-database:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/readiness', timeout=3).status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  allocation-key-generation-worker:
    profiles: ["dev"]
    build:
      context: allocation-key-generation
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    cpus: "2.0"
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://postgres:${CRM_DB_PASSWORD}@crm-database:5432/crm_db
      - LOCAL_DATABASE_URL=postgresql+asyncpg://postgres:${ALLOCATION_KEY_DB_PASSWORD}@allocation-key-db:5432/allocation_key_local
      - NATS_URL=nats://nats:4222
      - ALLOW_ORIGIN=*
      - CRM_DB_POOL_SIZE=5
      - CRM_DB_MAX_OVERFLOW=5
      - LOCAL_DB_POOL_SIZE=5
      - LOCAL_DB_MAX_OVERFLOW=5
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_REGION=us-east-1
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    networks:
      - backend
    depends_on:
      allocation-key-db:
        condition: service_healthy
      crm-database:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  simulation-key:
    profiles: ["dev"]
    build:
      context: simulation-key
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://postgres:${CRM_DB_PASSWORD}@crm-database:5432/crm_db
      - LOCAL_DATABASE_URL=postgresql+asyncpg://postgres:${SIMULATION_KEY_DB_PASSWORD}@simulation-key-db:5432/simulation_key_local
      - NATS_URL=nats://nats:4222
      - ALLOW_ORIGIN=*
      - CRM_DB_POOL_SIZE=5
      - CRM_DB_MAX_OVERFLOW=5
      - LOCAL_DB_POOL_SIZE=5
      - LOCAL_DB_MAX_OVERFLOW=5
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_REGION=us-east-1
    ports:
      - "8003:8000"
    networks:
      - backend
    depends_on:
      simulation-key-db:
        condition: service_healthy
      crm-database:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/readiness', timeout=3).status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  simulation-key-worker:
    profiles: ["dev"]
    build:
      context: simulation-key
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    cpus: "2.0"
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://postgres:${CRM_DB_PASSWORD}@crm-database:5432/crm_db
      - LOCAL_DATABASE_URL=postgresql+asyncpg://postgres:${SIMULATION_KEY_DB_PASSWORD}@simulation-key-db:5432/simulation_key_local
      - NATS_URL=nats://nats:4222
      - ALLOW_ORIGIN=*
      - CRM_DB_POOL_SIZE=5
      - CRM_DB_MAX_OVERFLOW=5
      - LOCAL_DB_POOL_SIZE=5
      - LOCAL_DB_MAX_OVERFLOW=5
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_REGION=us-east-1
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    networks:
      - backend
    depends_on:
      simulation-key-db:
        condition: service_healthy
      crm-database:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  optimce-news-board:
    profiles: ["dev"]
    build:
      context: news-board
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://postgres:${CRM_DB_PASSWORD}@crm-database:5432/crm_db
      - LOCAL_DATABASE_URL=postgresql+asyncpg://postgres:${NEWS_BOARD_DB_PASSWORD}@news-board-db:5432/news_board_local
      - ALLOW_ORIGIN=*
      - CRM_DB_POOL_SIZE=5
      - CRM_DB_MAX_OVERFLOW=5
      - LOCAL_DB_POOL_SIZE=5
      - LOCAL_DB_MAX_OVERFLOW=5
    ports:
      - "8004:8000"
    networks:
      - backend
    depends_on:
      news-board-db:
        condition: service_healthy
      crm-database:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/readiness', timeout=3).status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  billing:
    profiles: ["dev"]
    build:
      context: billing
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://postgres:${CRM_DB_PASSWORD}@crm-database:5432/crm_db
      - LOCAL_DATABASE_URL=postgresql+asyncpg://postgres:${BILLING_DB_PASSWORD}@billing-db:5432/billing_local
      - NATS_URL=nats://nats:4222
      - ALLOW_ORIGIN=*
      - CRM_DB_POOL_SIZE=5
      - CRM_DB_MAX_OVERFLOW=5
      - LOCAL_DB_POOL_SIZE=5
      - LOCAL_DB_MAX_OVERFLOW=5
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - OUTPUT_BUCKET=${OUTPUT_BUCKET:-optimce-documents}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_REGION=us-east-1
      - REGULATORS_CONFIG_PATH=/app/reference/regulators.json
      - DEFAULT_LOCALE=fr-BE
    volumes:
      - ./reference:/app/reference:ro
    ports:
      - "8005:8000"
    networks:
      - backend
    depends_on:
      billing-db:
        condition: service_healthy
      crm-database:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/readiness', timeout=3).status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  billing-worker:
    profiles: ["dev"]
    build:
      context: billing
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      - ENV=local
      - CRM_DATABASE_URL=postgresql+asyncpg://postgres:${CRM_DB_PASSWORD}@crm-database:5432/crm_db
      - LOCAL_DATABASE_URL=postgresql+asyncpg://postgres:${BILLING_DB_PASSWORD}@billing-db:5432/billing_local
      - NATS_URL=nats://nats:4222
      - ALLOW_ORIGIN=*
      - CRM_DB_POOL_SIZE=5
      - CRM_DB_MAX_OVERFLOW=5
      - LOCAL_DB_POOL_SIZE=5
      - LOCAL_DB_MAX_OVERFLOW=5
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-crm-files}
      - OUTPUT_BUCKET=${OUTPUT_BUCKET:-optimce-documents}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_REGION=us-east-1
      - REGULATORS_CONFIG_PATH=/app/reference/regulators.json
      - DEFAULT_LOCALE=fr-BE
    volumes:
      - ./reference:/app/reference:ro
    networks:
      - backend
    depends_on:
      billing-db:
        condition: service_healthy
      crm-database:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      # Start docgen first so its DOCGEN_RESULTS stream usually exists before we
      # subscribe. Streams are created asynchronously after docgen starts, so the
      # background subscribe-retry in worker/dispatcher.py is the real guarantee.
      document-generation:
        condition: service_started

  document-generation:
    profiles: ["dev"]
    build:
      context: document-generation
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      - ENV=local
      - NATS_URL=nats://nats:4222
      - STORAGE_ENDPOINT=${STORAGE_API_URL}
      - TEMPLATES_BUCKET=${TEMPLATES_BUCKET:-optimce-templates}
      - OUTPUT_BUCKET=${OUTPUT_BUCKET:-optimce-documents}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_REGION=us-east-1
    networks:
      - backend
    depends_on:
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  keycloak-config:
    profiles: ["init", "dev"]
    image: ghcr.io/ourouk/alpine-envsubst:main@sha256:10899e32576d793f054ddbf23889dc6ef6295726d350a377efc110a976c1a11e
    env_file:
      - .env.dev
    volumes:
      - ./keycloak/realm:/config
    command:
      - < /config/dev-config.template.json > /config/dev-config.json

  nginx-config:
    profiles: ["init", "dev"]
    image: ghcr.io/ourouk/alpine-envsubst:main@sha256:10899e32576d793f054ddbf23889dc6ef6295726d350a377efc110a976c1a11e
    env_file:
      - .env.dev
    environment:
      - CRM_FRONTEND_UPSTREAM=crm-frontend:80
      - KRAKEND_UPSTREAM=krakend:8080
      - KEYCLOAK_UPSTREAM=keycloak:8080
      - MINIO_UPSTREAM=minio:9000
      - CRM_FRONTEND_PROTOCOL=http
      - KRAKEND_PROTOCOL=http
      - KEYCLOAK_PROTOCOL=http
      - MINIO_PROTOCOL=http
    volumes:
      - ./nginx/conf-template.d:/config
      - ./nginx/conf.d:/output
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        if [ "${USE_HTTPS}" = "true" ]; then
          cp /config/default-https.template.conf /tmp/template.conf;
        else
          cp /config/default-http.template.conf /tmp/template.conf;
        fi
        envsubst < /tmp/template.conf | sed 's/§/$/g' > /output/default.conf

  crm-frontend-config:
    profiles: ["init", "dev"]
    image: ghcr.io/ourouk/alpine-envsubst:main@sha256:10899e32576d793f054ddbf23889dc6ef6295726d350a377efc110a976c1a11e
    env_file:
      - .env.dev
    volumes:
      - ./crm-frontend-config:/config
    command:
      - < /config/config.template.json > /config/config.json

  crm-frontend:
    profiles: ["dev"]
    build:
      context: crm-frontend
      dockerfile: Dockerfile
    volumes:
      - ./crm-frontend-config/config.json:/usr/share/nginx/html/assets/config/config.json
    environment:
      - NODE_ENV=production
    ports:
      - "8090:80"
    networks:
      - reverse-proxy

volumes:
  minio_data:
  nats_data:

networks:
  backend:
  reverse-proxy:
