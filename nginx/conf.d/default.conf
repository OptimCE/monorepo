upstream crm-frontend {
    server crm-frontend:80;
}

upstream krakend {
    server krakend:8080;
}

upstream keycloak {
    server keycloak:8080;
}

server {
    listen 80;
    server_name localhost;



    location / {
        proxy_pass http://crm-frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 301 /api/;
    }

    location /api/ {
        proxy_pass http://krakend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /api;
    }

        location = /keycloak {
        return 301 /keycloak/;
    }

    location /keycloak/ {
        proxy_pass http://keycloak;
        proxy_redirect ~^http://localhost(/.*)$ http://localhost:8087$1;
        sub_filter 'http://localhost/keycloak' 'http://localhost:8087/keycloak';
        sub_filter_once off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Forwarded "host=$host:$server_port;proto=$scheme";
    }
}
