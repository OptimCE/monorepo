upstream crm-frontend {
    server ${CRM_FRONTEND_UPSTREAM};
}

upstream krakend {
    server ${KRAKEND_UPSTREAM};
}

upstream keycloak {
    server ${KEYCLOAK_UPSTREAM};
}
upstream minio{
    server ${MINIO_UPSTREAM};
}

map §http_upgrade §connection_upgrade {
    default "upgrade";
    '' "close";
}

server {
    listen 80;
    server_name ${DOMAIN_HOST};

    location / {
        proxy_pass ${CRM_FRONTEND_PROTOCOL}://crm-frontend;
        include /etc/nginx/conf.d/proxy-common-headers.conf;
        proxy_set_header Upgrade §http_upgrade;
        proxy_set_header Connection §connection_upgrade;
        proxy_intercept_errors on;
        error_page 404 = @angular_spa_fallback;
    }

    location @angular_spa_fallback {
        if (§request_uri ~* "\.[A-Za-z0-9]{2,8}(§|\?)") {
            return 404;
        }

        rewrite ^ /index.html break;
        proxy_pass ${CRM_FRONTEND_PROTOCOL}://crm-frontend;
        include /etc/nginx/conf.d/proxy-common-headers.conf;
    }

    location = /api {
        return 301 /api/;
    }

    location /api/ {
        proxy_pass ${KRAKEND_PROTOCOL}://krakend/;
        include /etc/nginx/conf.d/proxy-common-headers.conf;
        proxy_set_header X-Forwarded-Host §host;
        proxy_set_header X-Forwarded-Port §server_port;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    location = /keycloak {
        return 301 /keycloak/;
    }

    location /keycloak/ {
        proxy_pass ${KEYCLOAK_PROTOCOL}://keycloak;
        include /etc/nginx/conf.d/proxy-common-headers.conf;
        proxy_set_header Host §host:8087;
        proxy_set_header X-Forwarded-Host §host;
        proxy_set_header X-Forwarded-Port 8087;
        proxy_set_header Forwarded "host=§host:8087;proto=§scheme";
    }

    location /s3 {
        return 301 /s3/;
    }

    location /s3/ {
        proxy_pass ${MINIO_PROTOCOL}://minio;
        include /etc/nginx/conf.d/proxy-common-headers.conf;
        proxy_set_header X-Forwarded-Host §host;
        proxy_set_header X-Forwarded-Proto §scheme;
        proxy_set_header X-Forwarded-Prefix /minio;
    }
}