name: Update Submodules

on:
  repository_dispatch:
    types: [submodule-updated]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

      - name: Update only changed submodule
        run: |
          git submodule update --remote --merge ${{ github.event.client_payload.repo }}


      - name: Create Pull Request if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update submodules"
          branch: chore/update-submodules
          title: "chore: auto-update submodules"
          body: |
            This PR was automatically created because a submodule was updated.

            Please review the updated submodule commits before merging.
